services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kivu-advisory-backend:latest
    container_name: kivu_advisory_backend
    restart: unless-stopped
    env_file:
      - ./deployment/env/backend.env
    expose:
      - "8080"
    networks:
      - kivu_advisory_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: kivu-advisory-frontend:latest
    container_name: kivu_advisory_frontend
    restart: unless-stopped
    env_file:
      - ./deployment/env/frontend.env
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - kivu_advisory_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    container_name: kivu_advisory_caddy
    restart: unless-stopped
    env_file:
      - ./deployment/env/production.env
    ports:
      - "${REVERSE_PROXY_HTTP_PORT:-80}:80"
      - "${REVERSE_PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deployment/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - kivu_advisory_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  kivu_advisory_network:
    name: kivu_advisory_network
    driver: bridge

volumes:
  caddy_data:
    name: kivu_advisory_caddy_data

  caddy_config:
    name: kivu_advisory_caddy_config