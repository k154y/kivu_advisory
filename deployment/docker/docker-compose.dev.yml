services:
  postgres:
    image: postgres:16-alpine
    container_name: kivu_advisory_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kivu_advisory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - kivu_advisory_postgres_data:/var/lib/postgresql/data
    networks:
      - kivu_advisory_dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kivu_advisory"]
      interval: 5s
      timeout: 5s
      retries: 10

  workspace:
    build:
      context: ../..
      dockerfile: .devcontainer/Dockerfile
    container_name: kivu_advisory_workspace
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "8080:8080"
    env_file:
      - ../env/backend.env
      - ../env/frontend.env
    environment:
      APP_NAME: "Kivu Advisory Backend"
      APP_ENV: "development"
      APP_TIMEZONE: "Africa/Kigali"

      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      API_VERSION: "v1"
      API_BASE_PATH: "/api/v1"

      FRONTEND_PUBLIC_URL: "http://localhost:3000"
      BACKEND_PUBLIC_URL: "http://localhost:8080"

      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      CORS_ALLOWED_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
      CORS_ALLOWED_HEADERS: "Authorization,Content-Type,Accept,Origin"
      CORS_ALLOW_CREDENTIALS: "true"

      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/kivu_advisory?sslmode=disable"
      MIGRATIONS_PATH: "file://db/migrations"

      JWT_SECRET: "local-jwt-secret-change-this-value-to-32-plus-characters"
      JWT_ISSUER: "kivu-advisory"
      JWT_AUDIENCE: "kivu-advisory-users"
      JWT_ACCESS_TOKEN_TTL_MINUTES: "60"
      JWT_REFRESH_TOKEN_TTL_DAYS: "7"

      PASSWORD_MIN_LENGTH: "10"
      BCRYPT_COST: "12"

      STORAGE_DRIVER: "local"
      LOCAL_UPLOAD_DIR: "tmp/uploads-for-local-development"

      MAX_UPLOAD_SIZE_MB: "20"
      ALLOWED_UPLOAD_EXTENSIONS: "pdf,doc,docx,xls,xlsx,png,jpg,jpeg"

      CREDENTIAL_ENCRYPTION_KEY: "local-tax-credential-secret-key-32-characters-minimum"

      SEND_EMAIL_NOTIFICATIONS: "false"
      NOTIFY_ADMIN_ON_NEW_REQUEST: "true"
      NOTIFY_ADMIN_ON_DOCUMENT_UPLOAD: "true"
      NOTIFY_CLIENT_ON_STATUS_CHANGE: "true"

      LOG_LEVEL: "debug"
      LOG_FORMAT: "text"

      NEXT_PUBLIC_APP_NAME: "Kivu Advisory"
      NEXT_PUBLIC_APP_ENV: "development"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      NEXT_PUBLIC_API_URL: "http://localhost:8080/api/v1"

      GOCACHE: "/go-build-cache"
    volumes:
      - ../..:/workspace
      - backend_go_pkg_mod:/go/pkg/mod
      - backend_go_build_cache:/go-build-cache
      - frontend_node_modules:/workspace/frontend/node_modules
      - frontend_next_cache:/workspace/frontend/.next
    command: sleep infinity
    networks:
      - kivu_advisory_dev_network

networks:
  kivu_advisory_dev_network:
    name: kivu_advisory_dev_network
    driver: bridge

volumes:
  kivu_advisory_postgres_data:
    name: kivu_advisory_postgres_data

  backend_go_pkg_mod:
    name: kivu_advisory_backend_go_pkg_mod

  backend_go_build_cache:
    name: kivu_advisory_backend_go_build_cache

  frontend_node_modules:
    name: kivu_advisory_frontend_node_modules

  frontend_next_cache:
    name: kivu_advisory_frontend_next_cache